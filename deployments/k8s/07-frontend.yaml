apiVersion: apps/v1
kind: Deployment
metadata:
  name: gateway-frontend
  namespace: default
spec:
  replicas: 1
  selector:
    matchLabels:
      app: gateway-frontend
  template:
    metadata:
      labels:
        app: gateway-frontend
    spec:
      containers:
      - name: gateway-frontend
        image: deployments-frontend:latest
        imagePullPolicy: Never
        ports:
        - containerPort: 80
---
apiVersion: v1
kind: Service
metadata:
  name: gateway-frontend
  namespace: default
spec:
  type: LoadBalancer
  ports:
  - port: 6081
    targetPort: 80
  selector:
    app: gateway-frontend
