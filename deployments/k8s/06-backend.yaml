apiVersion: apps/v1
kind: Deployment
metadata:
  name: gateway-backend
  namespace: default
spec:
  replicas: 1
  selector:
    matchLabels:
      app: gateway-backend
  template:
    metadata:
      labels:
        app: gateway-backend
    spec:
      containers:
      - name: gateway-backend
        image: deployments-gateway:latest
        imagePullPolicy: Never
        ports:
        - containerPort: 8080
        envFrom:
        - configMapRef:
            name: gateway-config
        - secretRef:
            name: gateway-secrets
---
apiVersion: v1
kind: Service
metadata:
  name: gateway-backend
  namespace: default
spec:
  type: LoadBalancer
  ports:
  - port: 6080
    targetPort: 8080
  selector:
    app: gateway-backend
