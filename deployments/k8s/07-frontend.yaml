apiVersion: apps/v1
kind: Deployment
metadata:
  name: gateway-frontend
  namespace: default
spec:
  replicas: 2
  selector:
    matchLabels:
      app: gateway-frontend
  template:
    metadata:
      labels:
        app: gateway-frontend
    spec:
      containers:
      - name: gateway-frontend
        image: deployments-frontend:latest
        imagePullPolicy: Never
        ports:
        - containerPort: 80
        resources:
          requests:
            memory: "64Mi"
            cpu: "100m"
          limits:
            memory: "256Mi"
            cpu: "500m"
---
apiVersion: v1
kind: Service
metadata:
  name: gateway-frontend
  namespace: default
spec:
  type: LoadBalancer
  ports:
  - port: 6081
    targetPort: 80
  selector:
    app: gateway-frontend
