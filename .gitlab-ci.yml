stages:
  - test
  - secret-scan
  - sast-sonarqube
  - sca-cve
  - build
  - container-scan
  - deploy

variables:
  DOCKER_DRIVER: overlay2
  DOCKER_TLS_CERTDIR: ""
  # Harbor Registry Configuration
  HARBOR_HOST: "harbor.local" # Replace with actual Harbor URL/IP
  HARBOR_PROJECT: "dvc-gateway"
  FRONTEND_IMAGE_TAG: $HARBOR_HOST/$HARBOR_PROJECT/frontend:$CI_COMMIT_SHORT_SHA
  BACKEND_IMAGE_TAG: $HARBOR_HOST/$HARBOR_PROJECT/backend:$CI_COMMIT_SHORT_SHA

# -----------------------------------------------------
# 1. UNIT TESTING & REPORTING
# -----------------------------------------------------
unit-test-backend:
  stage: test
  image: golang:1.21-alpine
  before_script:
    - apk add --no-cache gcc musl-dev
    - go install github.com/jstemmer/go-junit-report/v2@latest
  script:
    - go test -v -coverprofile=coverage.out ./... 2>&1 | go-junit-report > report.xml
  artifacts:
    when: always
    reports:
      junit: report.xml
    paths:
      - coverage.out
      - report.xml
  allow_failure: false

unit-test-frontend:
  stage: test
  image: node:18-alpine
  script:
    - cd web/frontend
    - npm ci
    # Assuming there is a test script in package.json
    - npm run test --if-present
  allow_failure: true

# -----------------------------------------------------
# 2. SECRET SCANNING (Gitleaks)
# -----------------------------------------------------
gitleaks:
  stage: secret-scan
  image: zricethezav/gitleaks:latest
  script:
    - gitleaks detect --source . -v
  allow_failure: true

# -----------------------------------------------------
# 3. SAST & SONARQUBE (Code Quality & Security)
# -----------------------------------------------------
sonarqube-check:
  stage: sast-sonarqube
  image: 
    name: sonarsource/sonar-scanner-cli:latest
    entrypoint: [""]
  variables:
    SONAR_USER_HOME: "${CI_PROJECT_DIR}/.sonar"  # Defines the location of the analysis task cache
    GIT_DEPTH: "0"  # Tells git to fetch all the branches of the project, required by the analysis task
  cache:
    key: "${CI_JOB_NAME}"
    paths:
      - .sonar/cache
  script: 
    - sonar-scanner -Dsonar.projectKey=$SONAR_PROJECT_KEY -Dsonar.host.url=$SONAR_HOST_URL -Dsonar.login=$SONAR_TOKEN
  allow_failure: true

gosec:
  stage: sast-sonarqube
  image: securego/gosec:latest
  script:
    - gosec -fmt junit-xml -out gosec-results.xml ./...
  artifacts:
    reports:
      junit: gosec-results.xml
  allow_failure: true

eslint:
  stage: sast-sonarqube
  image: node:18-alpine
  script:
    - cd web/frontend
    - npm ci
    - npm run lint
  allow_failure: true

semgrep:
  stage: sast-sonarqube
  image: returntocorp/semgrep
  script:
    - semgrep ci
  allow_failure: true

# -----------------------------------------------------
# 4. SCA / CVE SCANNING (Software Composition Analysis)
# -----------------------------------------------------
trivy-fs:
  stage: sca-cve
  image: aquasec/trivy:latest
  script:
    - trivy fs --exit-code 1 --severity HIGH,CRITICAL .
  allow_failure: true

# -----------------------------------------------------
# 5. BUILD (Docker Build & Push to Harbor)
# -----------------------------------------------------
build-backend:
  stage: build
  image: docker:24.0.5
  services:
    - docker:24.0.5-dind
  before_script:
    - docker login -u $HARBOR_USERNAME -p $HARBOR_PASSWORD $HARBOR_HOST
  script:
    - docker build -t $BACKEND_IMAGE_TAG -f deployments/Dockerfile .
    - docker push $BACKEND_IMAGE_TAG

build-frontend:
  stage: build
  image: docker:24.0.5
  services:
    - docker:24.0.5-dind
  before_script:
    - docker login -u $HARBOR_USERNAME -p $HARBOR_PASSWORD $HARBOR_HOST
  script:
    - docker build -t $FRONTEND_IMAGE_TAG -f web/frontend/Dockerfile web/frontend
    - docker push $FRONTEND_IMAGE_TAG

# -----------------------------------------------------
# 6. CONTAINER SECURITY SCANNING (Harbor Image CVE Scan)
# -----------------------------------------------------
trivy-image:
  stage: container-scan
  image: aquasec/trivy:latest
  before_script:
    - export TRIVY_USERNAME=$HARBOR_USERNAME
    - export TRIVY_PASSWORD=$HARBOR_PASSWORD
  script:
    - trivy image --exit-code 0 --severity HIGH,CRITICAL $BACKEND_IMAGE_TAG
    - trivy image --exit-code 0 --severity HIGH,CRITICAL $FRONTEND_IMAGE_TAG
  allow_failure: true

# -----------------------------------------------------
# 7. DEPLOY (To K3s Cluster 172.16.60.190)
# -----------------------------------------------------
deploy-k3s:
  stage: deploy
  image: bitnami/kubectl:latest
  before_script:
    - mkdir -p ~/.kube
    - echo "$KUBECONFIG_CONTENT" > ~/.kube/config
    - chmod 600 ~/.kube/config
  script:
    # Update image tags in K8s deployment manifests using sed
    - sed -i "s|image: deployments-gateway:latest|image: $BACKEND_IMAGE_TAG|g" deployments/k8s/06-backend.yaml
    - sed -i "s|image: deployments-frontend:latest|image: $FRONTEND_IMAGE_TAG|g" deployments/k8s/07-frontend.yaml
    # Apply standard manifests
    - kubectl apply -f deployments/k8s/01-config.yaml
    - kubectl apply -f deployments/k8s/02-secrets.yaml
    - kubectl apply -f deployments/k8s/03-postgres.yaml
    - kubectl apply -f deployments/k8s/04-iotdb.yaml
    - kubectl apply -f deployments/k8s/05-nats.yaml
    - kubectl apply -f deployments/k8s/06-backend.yaml
    - kubectl apply -f deployments/k8s/07-frontend.yaml
  only:
    - main
    - master
