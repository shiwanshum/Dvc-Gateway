apiVersion: v1
kind: ConfigMap
metadata:
  name: gateway-config
  namespace: default
data:
  DB_HOST: "postgres"
  DB_PORT: "5432"
  DB_NAME: "gatewaydb"
  DB_USER: "admin"
  IOTDB_HOST: "iotdb"
  IOTDB_PORT: "6667"
  IOTDB_USER: "root"
  NATS_PORT: "4222"
  NATS_MONITOR_PORT: "8222"
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: postgres-init-script
  namespace: default
data:
  init.sh: |
    #!/bin/bash
    set -e
    psql -v ON_ERROR_STOP=1 --username "$POSTGRES_USER" --dbname "$POSTGRES_DB" <<-EOSQL
        -- Add any custom Postgres initialization here
    EOSQL
